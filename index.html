          return mRaw ? `有人${mRaw[1].trim()}${mRaw[2].trim()}。` : raw;
        })();
        return `<div class="stimulus">${safe(sentence)}</div><div class="question">${q}</div>`;
      }
      if (block === "受事—结果适配") {
        // 解析 "受事：X；拟议结果：Y" → 箭头展示
        const m = raw.match(/^受事：(.+?)；拟议结果：(.+)$/);
        if (m) {
          const patient = safe(m[1].trim());
          const result = safe(m[2].trim());
          return `<div class="stimulus" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span>${patient}</span><span style="color:#94a3b8;font-size:1.2em">→</span><span style="color:#1e40af;font-weight:600">${result}</span></div><div class="question">${q}</div>`;
        }
      }
      if (block === "整体事件可实现性") {
        // 拆分动作句和拟议结果，结果降为括号注释
        const m = raw.match(/^(有人.+?。)\s*拟议结果：(.+?)。?$/);
        if (m) {
          return `<div class="stimulus">${safe(m[1])}<br><span style="font-size:0.9em;color:#64748b;font-weight:400">（可能的结果：${safe(m[2].trim())}）</span></div><div class="question">${q}</div>`;
        }
      }
      return `<div class="stimulus">${safe(raw)}</div><div class="question">${q}</div>`;
    }
    const context = item["事件情境（熟悉度区块为空）"] ? `<div class="context"><strong>情境：</strong>${safe(item["事件情境（熟悉度区块为空）"])}</div>` : "";
    let displayStimulus = safe(item["目标句或V-R表达"]);
    if (item["区块"] === "情境中表达自然度") {
      const sent = item["目标句或V-R表达"];
      const mVR = sent.match(/^(他把.+?)(\S{2})了。$/) || sent.match(/^(.+?)(\S{2})了。$/);
      if (mVR) {
        displayStimulus = `${safe(mVR[1])}<span style="color:#1e40af;font-weight:700">${safe(mVR[2])}</span>了。`;
      }
    }
    return `${context}<div class="stimulus"><strong>${context ? "表达" : "V-R表达"}：</strong>${displayStimulus}</div><div class="question">${safe(item["完整问题"])}</div>`;
  }
  function addRatingTrial(item) {
    const isAttention = item.item_id === "AC01";
    timeline.push({
      type: jsPsychSurveyLikert,
      questions: [{ prompt: promptFor(item), labels: labelsFor(item["量表端点"]), required:true, name:"rating" }],
      button_label: "下一题",
      data: {
        task_type: isAttention ? "attention_check" : "rating",
        block: item["区块"],
        item_order: item["区块内顺序"],
        item_id: item.item_id,
        item_type: item["项目类型"],
        presented_material: sample === "A" ? item["呈现材料"] : item["目标句或V-R表达"],
        context: sample === "B" ? item["事件情境（熟悉度区块为空）"] : "",
        question_text: item["完整问题"],
        scale_endpoints: item["量表端点"]
      },
      on_finish: data => {
        data.rating_1_7 = Number(data.response.rating) + 1;
        data.attention_pass = isAttention ? Number(data.rating_1_7 === 6) : "";
        delete data.response;
      }
    });
  }

  if (!validVersion) {
    document.body.innerHTML = `<div class="jspsych-content-wrapper"><div class="jspsych-content"><h2>正在分配实验版本</h2><p style="font-size:18px">请稍候，请勿关闭或刷新页面。</p></div></div>`;
    fetch("https://pipe.jspsych.org/api/condition/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ experimentID: DATA_PIPE_EXPERIMENT_ID })
    })
      .then(response => response.json())
      .then(result => {
        if (!Number.isInteger(result.condition) || result.condition < 0 || result.condition > 3) {
          throw new Error(result.message || "未获得有效条件号");
        }
        const assignedVersion = allowedVersions[result.condition];
        window.location.replace(`${window.location.pathname}?version=${assignedVersion}`);
      })
      .catch(() => {
        document.body.innerHTML = `<div class="jspsych-content-wrapper"><div class="jspsych-content"><h2>暂时无法进入实验</h2><div class="warning">实验版本分配服务暂时不可用，请联系主试后再试。</div></div></div>`;
      });
  } else {
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: `<h1>欢迎参加汉语语言判断研究</h1><p style="font-size:18px;line-height:1.8">本研究希望了解汉语母语者对一些事件和表达的直觉判断。作答匿名，仅用于科研；预计用时约 ${sample === "A" ? "18—22" : "15—18"} 分钟。实验只能前进，不能后退。</p><div class="instruction"><strong>参与条件：</strong>年满18周岁；母语为汉语；自愿参加本研究。</div>`,
      choices: ["我已知情并自愿参加"],
      data: { task_type:"consent" }
    });
    timeline.push({
      type: jsPsychSurveyHtmlForm,
      preamble: "<h3>基本信息</h3><p>以下信息仅用于描述样本，不收集姓名、手机号等身份信息。</p>",
      html: `<div style="text-align:left;line-height:2.4;max-width:650px;margin:auto">
        <p><label><strong>1. 年龄：</strong><select name="age_group" required><option value="" disabled selected>请选择</option><option>18–24</option><option>25–34</option><option>35–44</option><option>45–54</option><option>55岁及以上</option></select></label></p>
        <p><label><strong>2. 您的母语是汉语吗？</strong><select name="native_chinese" required><option value="" disabled selected>请选择</option><option value="yes">是</option><option value="no">否</option></select></label></p>
        <p><label><strong>3. 从小成长的主要地区（省/市）：</strong><input name="region" required placeholder="例如：安徽合肥"></label></p>
        <p><label><strong>4. 性别（可不回答）：</strong><select name="gender"><option value="">不回答</option><option value="female">女</option><option value="male">男</option><option value="other">其他</option></select></label></p>
      </div>`,
      button_label: "提交并继续",
      data: { task_type:"demographics" },
      on_finish: data => {
        const r = data.response;
        data.age_group = r.age_group; data.native_chinese = r.native_chinese; data.region = r.region; data.gender = r.gender;
        jsPsych.data.addProperties({ native_chinese:r.native_chinese });
        delete data.response;
        if (r.native_chinese !== "yes") jsPsych.abortExperiment("感谢您的参与。本预测试目前仅面向汉语母语者，实验到此结束。");
      }
    });

    const rows = MATERIALS[sample].filter(row => row["版本"] === version);
    const blocks = [...new Set(rows.map(row => row["区块"]))];
    blocks.forEach(block => {
      const blockRows = rows.filter(row => row["区块"] === block);
      timeline.push(blockIntro(block, blockRows[0]["量表端点"]));
      blockRows.forEach(addRatingTrial);
      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<h3>本区块已完成</h3><p style="font-size:18px">您可以短暂休息。准备好后请继续。</p>`,
        choices: ["继续"],
        data: { task_type:"block_end", block }
      });
    });
    timeline.push({
      type: jsPsychCallFunction,
      func: () => jsPsych.data.addProperties({ total_duration_seconds:Math.round(jsPsych.getTotalTime()/1000) })
    });
    timeline.push({
      type: jsPsychPipe,
      action: "save",
      experiment_id: DATA_PIPE_EXPERIMENT_ID,
      filename,
      data_string: compactDataCsv,
      wait_message: "<p>正在提交数据，请勿关闭页面。</p>",
      data: { task_type:"data_save", save_attempt:1 }
    });
    timeline.push({
      timeline: [{
        type: jsPsychPipe,
        action: "save",
        experiment_id: DATA_PIPE_EXPERIMENT_ID,
        filename,
        data_string: compactDataCsv,
        wait_message: "<p>首次提交未成功，正在再次尝试，请勿关闭页面。</p>",
        data: { task_type:"data_save", save_attempt:2 }
      }],
      conditional_function: () => !saveSucceeded()
    });
    timeline.push({
      timeline: [{
        type: jsPsychHtmlButtonResponse,
        stimulus: `<h3>预测试完成</h3><p style="font-size:18px;color:#15803d;font-weight:600">数据已成功提交。感谢您的参与！</p><p class="muted">现在可以关闭浏览器窗口。</p>`,
        choices: []
      }],
      conditional_function: saveSucceeded
    });
    timeline.push({
      timeline: [{
        type: jsPsychHtmlButtonResponse,
        stimulus: () => {
          const save = latestSaveTrial();
          const error = save.result?.error || "UNKNOWN_SAVE_ERROR";
          const message = save.result?.message || "数据未能上传。";
          return `<h3>数据提交失败</h3><div class="warning"><strong>请不要关闭本页面。</strong><br>系统已尝试保存两次，但均未成功。备份文件将自动下载，请将其发送给主试。<br><span class="muted">错误：${safe(error)}；${safe(message)}</span></div><button class="jspsych-btn" onclick="downloadBackup()">再次下载备份数据</button>`;
        },
        choices: [],
        on_load: downloadBackup
      }],
      conditional_function: () => !saveSucceeded()
    });
    jsPsych.run(timeline);
  }
</script>
</body>
</html>
